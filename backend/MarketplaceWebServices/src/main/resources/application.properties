spring.application.name=MarketplaceWebServices

# Server Configuration
    server.port=${WEB_SERVICES_PORT:8080}

# Socket Server Connection
    socket.server.host=${SOCKET_SERVER_HOST:localhost}
    socket.server.port=${SOCKET_SERVER_PORT:9090}

# Logging
    logging.level.com.marketplace=DEBUG

# JWT Configuration
    jwt.secret=your_very_long_and_secure_random_secret_key_32_characters_min
    jwt.expiration=3600000

# Use H2 instead of PostgreSQL/CockroachDB
    spring.datasource.url=jdbc:h2:mem:testdb
    spring.datasource.driverClassName=org.h2.Driver
    spring.datasource.username=sa
    spring.datasource.password=password
    spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
    # This will create tables automatically based on your @Entity classes
    spring.jpa.hibernate.ddl-auto=update