name: Sync Backend-Agreements with main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into Backend-Agreements and delete README.txt
        run: |
          git checkout Backend-Agreements
          git merge origin/main --no-edit -m "restrucutred folders due to Using sockets"
          git rm --ignore-unmatch README.txt
          if ! git diff --cached --quiet; then
            git commit -m "restrucutred folders due to Using sockets"
          fi
          git push origin Backend-Agreements
