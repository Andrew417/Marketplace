name: Marketplace CI/CD

on:
  push:
    branches:
      - cicd
  pull_request:
    branches:
      - cicd

jobs:
  build-socket-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build SharedModels
        run: mvn -B clean install -DskipTests -f backend/MarketplaceSharedModels/pom.xml

      - name: Build SocketServer
        run: mvn -B clean package -DskipTests -f backend/MarketplaceSocketServer/pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push Socket Server Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/MarketplaceSocketServer/Dockerfile
          push: true
          tags: andrewehab417/marketplace-socket:latest

  build-bridge-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build BridgeServer
        run: mvn -B clean package -DskipTests -f backend/MarketplaceBridgeServer/pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push Bridge Server Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/MarketplaceBridgeServer/Dockerfile
          push: true
          tags: andrewehab417/marketplace-bridge:latest
