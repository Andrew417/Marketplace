name: Marketplace CI/CD

on:
  push:
    branches:
      - cicd
  pull_request:
    branches:
      - cicd

jobs:
  build-socket-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build SharedModels
        run: mvn -B clean install -DskipTests -f backend/MarketplaceSharedModels/pom.xml

      - name: Build SocketServer
        run: mvn -B clean package -DskipTests -f backend/MarketplaceSocketServer/pom.xml

      - name: Build Socket Server Docker image
        run: docker build -f backend/MarketplaceSocketServer/Dockerfile -t andrewehab417/marketplace-socket:latest backend/

  build-bridge-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build BridgeServer
        run: mvn -B clean package -DskipTests -f backend/MarketplaceBridgeServer/pom.xml

      - name: Build Bridge Server Docker image
        run: docker build -f backend/MarketplaceBridgeServer/Dockerfile -t andrewehab417/marketplace-bridge:latest backend/
